[global/wm]
include-file = ./colors.ini

[bar/main]
width = 100%
height = 24pt
radius = 6

; dpi = 96

background = ${colors.base}
foreground = ${colors.text}

line-size = 3pt

border-size = 4pt
border-color = #00000000

padding-left = 0
padding-right = 1

module-margin = 1

separator = |
separator-foreground = ${colors.surface2}

font-0 = FiraCode NF;2

modules-left = xworkspaces xwindow
modules-right = pulseaudio xkeyboard wlan eth battery date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

tray-position = right
tray-padding = 2 
tray-background = ${colors.background}

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true
include-file = ./workspaces.ini

include-file = ./xwindow.ini

include-file = ./pulseaudio.ini

include-file = ./xkeyboard.ini

include-file = ./networkbase.ini

include-file = ./wlan.ini

include-file = ./eth.ini

include-file = ./battery.ini

include-file = ./date.ini

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
